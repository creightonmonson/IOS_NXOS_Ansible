---
- name: Enable Features
  tags: ospf
  loop:
    - ospf
  cisco.nxos.nxos_feature:
    feature: "{{ item }}"
    state: enabled


- name: Configure OSPF 
  tags: ospf
  cisco.nxos.nxos_ospfv2:
    config: 
      processes:
        - process_id: "{{ ospf.process_id }}"
          router_id: "{{ ospf_router_id }}"


- name: Configure OSPF Interfaces
  tags: ospf
  loop: "{{ ospf.networks }}"
  cisco.nxos.nxos_ospf_interfaces:
    config:
      - name: "{{ item.interface }}"
        address_family:
          - afi: ipv4
            processes:
              - process_id: "{{ ospf.process_id }}"
                area:
                  area_id: "{{ item.area }}"

