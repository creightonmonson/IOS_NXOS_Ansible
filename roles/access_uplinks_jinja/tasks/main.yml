---
# loops through the hosts in access group and pulls in the host_vars array "uplinks" per host
- name: Generate Access Uplinks Configuration Files
  loop: "{{ groups['access'] }}"
  vars:
    uplinks: "{{ hostvars[item]['uplinks'] }}"
  ansible.builtin.template:
    src: templates/uplinks.j2
    dest: "{{ config_dir }}/{{ item }}-uplinks.conf"