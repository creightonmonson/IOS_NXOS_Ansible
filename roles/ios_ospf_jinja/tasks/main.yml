---
- name: Debug OSPF variable
  loop: "{{ groups['iosxe'] }}"
  vars:
    router_id: "{{ hostvars[item]['ospf_router_id'] }}"
    ospf_networks: "{{ hostvars[item]['ospf_networks'] }}"
  debug:
    msg: "Host {{ item }} ospf_networks: {{ ospf_networks }}"

  
